<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Save Our Wildlife</h1>
    </header>

    <main>

        <video id="wildlifeVideo" controls aria-label="Wildlife Conservation Video">
            <source src="wildlife.mp4" type="video/mp4">
            Your browser does not support HTML5 video.
        </video>

        <p class="description">
            Wildlife conservation is essential for protecting endangered species
            and preserving biodiversity for future generations. Every effort counts.
        </p>

        <button id="toggleButton">
            Hide / Play Video
        </button>

    </main>

    <script src="script.js"></script>

</body>
</html>
